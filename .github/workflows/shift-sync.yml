name: Shift Sync

on:
  schedule:
    # 6時間ごと自動実行: 0:00 / 6:00 / 12:00 / 18:00 UTC (JST: 9:00 / 15:00 / 21:00 / 3:00)
    - cron: '0 0,6,12,18 * * *'
  repository_dispatch:
    types: [shift-sync]  # HP同期ボタンから即時トリガー
  workflow_dispatch:     # GitHub UIから手動実行も可

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test City Heaven access
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Cookie: nenrei=y" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            "https://www.cityheaven.net/chiba/A1202/A120201/iyashitakute/attend/")
          SECRET_STATUS="${{ secrets.SYNC_SECRET != '' && '設定済み' || '未設定 ← これが原因' }}"
          echo "## Shift Sync Debug" >> $GITHUB_STEP_SUMMARY
          echo "- City Heaven HTTP: **$STATUS** $([ "$STATUS" = "200" ] && echo "✅" || echo "❌ ブロックされています")" >> $GITHUB_STEP_SUMMARY
          echo "- SYNC_SECRET: **$SECRET_STATUS**" >> $GITHUB_STEP_SUMMARY
          echo "City Heaven HTTP: $STATUS"
          echo "SYNC_SECRET: $SECRET_STATUS"
      - name: Sync shifts from City Heaven
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node scripts/shift-sync-gh.js
