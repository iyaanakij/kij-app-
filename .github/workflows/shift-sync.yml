name: Shift Sync

on:
  schedule:
    # 6時間ごと自動実行: 0:00 / 6:00 / 12:00 / 18:00 UTC (JST: 9:00 / 15:00 / 21:00 / 3:00)
    - cron: '0 0,6,12,18 * * *'
  repository_dispatch:
    types: [shift-sync]  # HP同期ボタンから即時トリガー
  workflow_dispatch:     # GitHub UIから手動実行も可

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test City Heaven access
        run: |
          echo "=== City Heaven 疎通確認 ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Cookie: nenrei=y" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            "https://www.cityheaven.net/chiba/A1202/A120201/iyashitakute/attend/" || true
          echo "=== SYNC_SECRET 確認 ==="
          if [ -z "${{ secrets.SYNC_SECRET }}" ]; then echo "SYNC_SECRET: 未設定"; else echo "SYNC_SECRET: 設定済み"; fi
      - name: Sync shifts from City Heaven
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node scripts/shift-sync-gh.js
